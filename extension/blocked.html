<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Domain Blocked</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #111827; /* tailwind gray-900 */
      color: #F9FAFB; /* tailwind gray-50 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background-color: #1F2937; /* tailwind gray-800 */
      padding: 3rem;
      border-radius: 1rem;
      border: 1px solid #374151; /* tailwind gray-700 */
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      max-width: 500px;
    }
    .icon {
      color: #EF4444; /* tailwind red-500 */
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
      color: #EF4444;
    }
    p {
      color: #9CA3AF; /* tailwind gray-400 */
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .domain {
      font-weight: bold;
      color: #F9FAFB;
      background-color: #374151;
      padding: 0.2rem 0.5rem;
      border-radius: 0.25rem;
    }
    .btn {
      background-color: #2563EB; /* tailwind blue-600 */
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #1D4ED8; /* tailwind blue-700 */
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
    </svg>
    <h1>Site Blocked by Screentime Recorder</h1>
    <p>You have blocked access to <span class="domain" id="domain-name">this site</span> until <span id="block-time">it expires</span>.</p>
    <a href="#" class="btn" id="dashboard-btn">Go to Dashboard</a>
  </div>
  <script src="config.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
